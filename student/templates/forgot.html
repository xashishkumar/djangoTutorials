{% extends "base.html" %}

{% block content %}
<div class="container-fluid bg-light d-flex align-items-center justify-content-center" style="height: 90vh;">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-sm-5">
                    
                    <a href="{% url 'login' %}" class="text-muted text-decoration-none small mb-3 d-inline-block">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>

                    <h2 class="text-center mb-2 fw-bold text-dark">Reset Password</h2>
                    <p class="text-center text-muted small mb-4">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-md bg-light border-0" placeholder="name@example.com" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg fw-bold rounded-3 py-2" style="background-color: #e61e4d; border: none;">
                                Send Reset Link
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 small text-muted">
                            Need help? <a href="#" class="text-danger fw-bold text-decoration-none">Contact Support</a>
                        </p>
                    </div>

                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
